<nav class="site-nav" aria-label="Main navigation">
  <a href="/" class="brand">Sangeet Hub</a>

  <div class="nav-actions" id="navActions">
    <!-- Login button will show when not authenticated -->
    <button id="loginBtn" class="btn btn-primary" aria-label="Login to Sangeet Hub">Login</button>

    <!-- Logout button will show when authenticated -->
    <button id="logoutBtn" class="btn btn-primary" aria-label="Log out of Sangeet Hub" style="display:none;">
      Logout
    </button>
  </div>
</nav>

<!-- Inline styles for the header auth buttons (feel free to move to your main CSS file) -->
<style>
.site-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: #0f1720;
  color: #fff;
}

.site-nav .brand {
  font-weight: 700;
  font-size: 1.1rem;
  color: #fff;
  text-decoration: none;
}

.nav-actions .btn {
  padding: 8px 12px;
  background: #1db954;
  color: #ffffff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}

.nav-actions .btn:hover { opacity: 0.9; }
</style>

<!-- Inline auth UI script: simple localStorage-based demo. Replace with your real auth flow. -->
<script>
(function () {
  function isAuthenticated() {
    return !!localStorage.getItem('authToken');
  }

  function updateAuthUI() {
    var loginBtn = document.getElementById('loginBtn');
    var logoutBtn = document.getElementById('logoutBtn');
    var auth = isAuthenticated();
    if (loginBtn) loginBtn.style.display = auth ? 'none' : 'inline-block';
    if (logoutBtn) logoutBtn.style.display = auth ? 'inline-block' : 'none';
  }

  document.addEventListener('DOMContentLoaded', function () {
    updateAuthUI();

    var loginBtn = document.getElementById('loginBtn');
    var logoutBtn = document.getElementById('logoutBtn');

    if (loginBtn) {
      loginBtn.addEventListener('click', function (e) {
        e.preventDefault();
        // Demo login: set a token. Replace with actual login redirect/modal.
        localStorage.setItem('authToken', 'sangeet-demo-token');
        updateAuthUI();
        // optionally: window.location.href = '/dashboard';
      });
    }

    if (logoutBtn) {
      logoutBtn.addEventListener('click', function (e) {
        e.preventDefault();
        // If you have a server logout endpoint, call it here, for example:
        // fetch('/api/logout', { method: 'POST', credentials: 'include' }).finally(function(){ ... });

        // Clear local auth state (or rely on server to clear cookie/session)
        localStorage.removeItem('authToken');
        updateAuthUI();
        // Redirect after logout
        window.location.href = '/';
      });
    }
  });
})();
</script>
